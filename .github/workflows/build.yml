name: Build Automation-Platform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build application
        run: |
          pyinstaller Automation-Platform.spec

      - name: Verify build output
        run: |
          ls -la dist/
          ls -la dist/*.app || echo "No .app found"
          ls -la dist/*.app/Contents/MacOS/ || echo "No MacOS folder found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Automation-Platform-arm64
          path: dist/Automation-Platform.app
          retention-days: 7